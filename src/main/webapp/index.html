<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    h2 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #888;
    }

    button[type="submit"] {
      width: 100%;
      padding: 10px;
      margin-top: 0.5rem;
      font-size: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Submit details</h2>
    <form action="Servlet1" method="get">

      <div class="field">
        <label for="Email">Email</label>
        <input type="email" id="param1" name="Email" placeholder="Enter value" required />
      </div>

      <div class="field">
        <label for="Password">Password</label>
        <input type="password" id="param2" name="Password" placeholder="Enter value" required />
      </div>

      <button type="submit">Submit</button>

    </form>
  </div>

</body>
</html>
